<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WWD V2X Dashboard — LiDAR → J2735 TIM</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React 18 + Babel -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<!-- Pinned to 7.x: Babel 8 changed the React preset default to the "automatic" JSX runtime,
     which emits `import ... from "react/jsx-runtime"` and breaks the in-browser (classic <script>) loader. -->
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<script>
  // Force the classic JSX runtime (JSX -> React.createElement) regardless of Babel's default,
  // so this keeps working even if the pinned version is ever bumped.
  Babel.registerPreset("react-classic", {
    presets: [[Babel.availablePresets["react"], { runtime: "classic" }]],
  });
</script>

<style>
  :root {
    --bg:        #0a0c10;
    --surface:   #14181f;
    --surface-2: #1b212b;
    --border:    #2a3340;
    --text:      #e6edf3;
    --muted:     #8b97a7;
    --red:       #ef4444;
    --orange:    #f59e0b;
    --green:     #22c55e;
  }

  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .leaflet-container { background: #0e1116; }
  .leaflet-control-attribution {
    background: rgba(10,12,16,0.7) !important;
    color: #6b7686 !important;
  }
  .leaflet-control-attribution a { color: #8b97a7 !important; }

  /* Animated wrong-way vehicle */
  .veh-wrap {
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s linear;
  }
  .veh-body {
    width: 18px; height: 18px;
    background: var(--red);
    border: 2px solid #fff;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; line-height: 1;
    box-shadow: 0 0 10px 2px rgba(239,68,68,0.85);
  }

  /* RSU broadcast circle pulse (SVG path) */
  @keyframes rsuPulse {
    0%, 100% { stroke-opacity: 0.9; fill-opacity: 0.04; }
    50%      { stroke-opacity: 0.35; fill-opacity: 0.16; }
  }
  path.rsu-circle { animation: rsuPulse 1.6s ease-in-out infinite; }
  path.rsu-fade { transition: opacity 1s ease; opacity: 0; }

  /* Card slide-in */
  @keyframes slide-in-top {
    0%   { transform: translateY(-18px); opacity: 0; }
    100% { transform: translateY(0);     opacity: 1; }
  }
  .card-enter { animation: slide-in-top 0.35s cubic-bezier(.2,.8,.2,1); }

  @keyframes status-glow {
    0%, 100% { box-shadow: 0 0 0 0 currentColor; }
    50%      { box-shadow: 0 0 0 6px transparent; }
  }
  .status-pulse { animation: status-glow 1.2s ease-in-out infinite; }

  .feed-scroll::-webkit-scrollbar { width: 8px; }
  .feed-scroll::-webkit-scrollbar-track { background: transparent; }
  .feed-scroll::-webkit-scrollbar-thumb { background: #2a3340; border-radius: 8px; }
  .feed-scroll::-webkit-scrollbar-thumb:hover { background: #3a4655; }

  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 999px; background: #2a3340; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--orange); border: 3px solid #1b212b; cursor: pointer;
    box-shadow: 0 0 6px rgba(245,158,11,0.6);
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--orange); border: 3px solid #1b212b; cursor: pointer;
  }

  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }

  .crosshair .leaflet-container { cursor: crosshair; }

  /* Pipeline flow arrows */
  @keyframes flowDash { from { background-position: 0 0; } to { background-position: 18px 0; } }
  .flow-arrow {
    height: 3px; border-radius: 2px; flex: 1; min-width: 16px;
    background-image: repeating-linear-gradient(90deg, var(--border) 0 6px, transparent 6px 12px);
    background-size: 18px 3px;
  }
  .flow-arrow.flowing {
    background-image: repeating-linear-gradient(90deg, var(--orange) 0 6px, transparent 6px 12px);
    animation: flowDash 0.5s linear infinite;
  }
  .flow-arrow.flowing-red {
    background-image: repeating-linear-gradient(90deg, var(--red) 0 6px, transparent 6px 12px);
    animation: flowDash 0.5s linear infinite;
  }
  @keyframes dotPulse { 0%,100% { box-shadow: 0 0 0 0 currentColor; } 50% { box-shadow: 0 0 0 5px transparent; } }
  .dot-pulse { animation: dotPulse 1.1s ease-in-out infinite; }

  /* Output box pulse */
  @keyframes outPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); } 50% { box-shadow: 0 0 0 5px rgba(239,68,68,0); } }
  .out-pulse { animation: outPulse 1.2s ease-in-out infinite; }

  /* C-V2X receiver markers */
  .recv-dot {
    width: 14px; height: 14px; border-radius: 4px; border: 2px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; color: #fff; line-height: 1;
  }
  @keyframes recvPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.65); } 50% { box-shadow: 0 0 0 6px rgba(34,197,94,0); } }
  .recv-alerted { animation: recvPulse 1.2s ease-in-out infinite; }

  /* legal-direction-of-travel chevrons along the road */
  .legal-arrow { color: #22c55e; font-size: 13px; line-height: 1; text-shadow: 0 0 3px rgba(0,0,0,0.9); }

  /* simulated nav-platform notification slide-in */
  @keyframes navIn { 0% { transform: translateY(8px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
  .nav-in { animation: navIn 0.4s ease; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react-classic">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

/* =========================================================================
 * Constants
 * ======================================================================= */
const STORAGE_KEY = "wwd_v2x_intersections";

// Default site = a REAL one-way road pulled from OpenStreetMap. Because OSM stores a
// one-way road's nodes in the direction of legal travel, "wrong-way" is simply driving
// against this node order — the legal direction is known, not guessed.
const DEFAULT_SITE = {
  id: "houston-allen-fr",
  name: "Allen Pkwy Frontage Rd — Houston, TX",
  protected: true,
  createdAt: "2024-01-01T00:00:00.000Z",
  source: "OSM way 15331729 · highway=tertiary · oneway=yes",
  roadName: "Allen Parkway Frontage Road",
  center: [29.761420, -95.393672],
  elevation: 12,
  applicableRegion: {
    nwLat: 29.762510, nwLon: -95.395466,
    seLat: 29.760432, seLon: -95.391692,
  },
  // ordered in the LEGAL direction of travel (westbound, per OSM oneway tagging)
  laneNodes: [
    [29.761710, -95.392492],
    [29.761579, -95.392996],
    [29.761303, -95.394007],
    [29.761276, -95.394199],
    [29.761232, -95.394666],
  ],
};

const ANIM_SPEEDS = { Slow: 140, Normal: 80, Fast: 40 };
const STEPS_PER_SEGMENT = 12;

/* =========================================================================
 * Helpers
 * ======================================================================= */
function pad(n) { return String(n).padStart(2, "0"); }

function formatTimeStamp(d) {
  let h = d.getHours();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12; if (h === 0) h = 12;
  return `${pad(d.getMonth() + 1)}/${pad(d.getDate())}/${d.getFullYear()} ` +
         `${pad(h)}:${pad(d.getMinutes())} ${ampm}`;
}

function randomPacketID() {
  return String(Math.floor(100000000 + Math.random() * 900000000));
}

function genUUID() {
  if (crypto.randomUUID) return crypto.randomUUID();
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0, v = c === "x" ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function confidenceColor(frames) {
  if (frames >= 10) return { bg: "bg-red-500/20",    txt: "text-red-300",    ring: "ring-red-500/40" };
  if (frames >= 5)  return { bg: "bg-orange-500/20", txt: "text-orange-300", ring: "ring-orange-500/40" };
  return                   { bg: "bg-yellow-500/20", txt: "text-yellow-300", ring: "ring-yellow-500/40" };
}

// Bearing in degrees (0-360) from p1 -> p2, each [lat, lon]
function bearing(p1, p2) {
  const toRad = (x) => x * Math.PI / 180;
  const φ1 = toRad(p1[0]), φ2 = toRad(p2[0]);
  const Δλ = toRad(p2[1] - p1[1]);
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// Build interpolated points along the path. reverse=true => WRONG-WAY (last node -> first node).
function buildAnimationPoints(laneNodes, reverse = true) {
  const seq = reverse ? [...laneNodes].slice().reverse() : [...laneNodes];
  const pts = [];
  for (let i = 0; i < seq.length - 1; i++) {
    const a = seq[i], b = seq[i + 1];
    const hdg = bearing(a, b);
    for (let s = 0; s < STEPS_PER_SEGMENT; s++) {
      const t = s / STEPS_PER_SEGMENT;
      pts.push({
        lat: a[0] + (b[0] - a[0]) * t,
        lon: a[1] + (b[1] - a[1]) * t,
        heading: Math.round(hdg),
        segment: i,
      });
    }
  }
  // final point
  const last = seq[seq.length - 1];
  const prev = seq[seq.length - 2];
  pts.push({ lat: last[0], lon: last[1], heading: Math.round(bearing(prev, last)), segment: seq.length - 2 });
  return pts;
}

// Haversine distance in meters between [lat,lon] points
function haversine(a, b) {
  const R = 6371000, toRad = (x) => x * Math.PI / 180;
  const dLat = toRad(b[0] - a[0]), dLon = toRad(b[1] - a[1]);
  const la1 = toRad(a[0]), la2 = toRad(b[0]);
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

// Realistic detection→broadcast latency budget (ms)
function genLatency() {
  const r = (a, b) => Math.round((a + Math.random() * (b - a)) * 10) / 10;
  const capture = r(8, 12), inference = r(28, 46), encode = r(2, 4), queue = r(5, 12), air = r(9, 15);
  const total = Math.round((capture + inference + encode + queue + air) * 10) / 10;
  return { capture, inference, encode, queue, air, total };
}

// Simulated SAE J2735 UPER (bit-packed) encoding with a labelled byte breakdown
function toHex(n, bytes) {
  let s = "";
  for (let k = bytes - 1; k >= 0; k--) s += ((n >> (8 * k)) & 0xff).toString(16).padStart(2, "0");
  return s.toUpperCase();
}
function int32Hex(val) {
  const n = Math.round(val) >>> 0; // 32-bit two's complement
  return n.toString(16).padStart(8, "0").toUpperCase();
}
function encodeUPER(tim) {
  const ap = tim.anchorPoint, df = tim.dataFrame;
  const segs = [];
  segs.push({ label: "msgID — DSRC.TravelerInformation", hex: "001F" });
  segs.push({ label: "packetID (uint32)", hex: toHex(Number(tim.packetID) % 0xffffffff, 4) });
  segs.push({ label: "msgCnt", hex: toHex(Math.floor(Math.random() * 128), 1) });
  segs.push({ label: "ITIS code 8708", hex: toHex(8708, 2) });
  segs.push({ label: "priority", hex: toHex(Number(tim.priority), 1) });
  segs.push({ label: "anchor lat (1e-7°)", hex: int32Hex(ap.referenceLat * 1e7) });
  segs.push({ label: "anchor lon (1e-7°)", hex: int32Hex(ap.referenceLon * 1e7) });
  segs.push({ label: "elevation (dm)", hex: toHex(Math.round(ap.referenceElevation * 10) & 0xffff, 2) });
  segs.push({ label: "heading (0.0125°/LSB)", hex: toHex(Math.round(df.heading_deg / 0.0125) & 0xffff, 2) });
  segs.push({ label: "speed (0.02 m/s LSB)", hex: toHex(Math.round(df.speed_mps / 0.02) & 0xffff, 2) });
  segs.push({ label: "duration (minutes)", hex: toHex(Math.max(1, Math.round(df.durationSeconds / 60)) & 0xffff, 2) });
  const nodes = tim.regions[0].laneNodes;
  segs.push({ label: "nodeCount", hex: toHex(nodes.length & 0xff, 1) });
  nodes.forEach((nd, i) => {
    const dLat = Math.round((nd.lat - ap.referenceLat) * 1e7) & 0xffff;
    const dLon = Math.round((nd.lon - ap.referenceLon) * 1e7) & 0xffff;
    segs.push({ label: `node ${i + 1} Δlat/Δlon`, hex: toHex(dLat, 2) + toHex(dLon, 2) });
  });
  return { hex: segs.map((s) => s.hex).join(""), segments: segs };
}

// Scatter ambient C-V2X receiver vehicles around the intersection (some in, some out of range)
function generateReceivers(center) {
  const recs = [];
  for (let i = 0; i < 6; i++) {
    const brg = Math.random() * 2 * Math.PI;
    const dist = 80 + Math.random() * 440; // 80–520 m
    const dLat = (dist * Math.cos(brg)) / 111111;
    const dLon = (dist * Math.sin(brg)) / (111111 * Math.cos(center[0] * Math.PI / 180));
    recs.push({ id: "rx" + i, coord: [center[0] + dLat, center[1] + dLon], alerted: false });
  }
  return recs;
}

function buildAlertsCSV(alerts) {
  const cols = ["number", "timestamp", "intersection", "lat", "lon", "heading_deg", "speed_mps", "speed_kmh",
    "confidence_frames", "classification", "latency_ms", "packetID", "eventUUID"];
  const esc = (v) => `"${String(v).replace(/"/g, '""')}"`;
  const rows = alerts.slice().reverse().map((a) => [
    a.number, a.timestamp, a.intersectionName, a.coord[0].toFixed(6), a.coord[1].toFixed(6),
    a.heading, a.speed, (a.speed * 3.6).toFixed(1), a.confidenceFrames, a.truth,
    a.latency.total, a.packetID, a.tim.eventID,
  ]);
  return [cols.map(esc).join(","), ...rows.map((r) => r.map(esc).join(","))].join("\n");
}

function buildTIM({ uuid, packetID, intersection, coord, elevation, speed, heading, startDate }) {
  const endDate = new Date(startDate.getTime() + 30 * 1000);
  const ar = intersection.applicableRegion;
  return {
    messageType: "TIM",
    packetID,
    eventID: uuid,
    itisCode: "8708",
    itisPhrase: "wrong-way driving",
    priority: "1",
    applicableRegion: {
      nwLat: ar.nwLat, nwLon: ar.nwLon, seLat: ar.seLat, seLon: ar.seLon,
    },
    anchorPoint: {
      referenceLat: Number(coord[0].toFixed(6)),
      referenceLon: Number(coord[1].toFixed(6)),
      referenceElevation: elevation,
    },
    regions: [{
      laneNodes: intersection.laneNodes.map(([lat, lon]) => ({ lat, lon })),
      laneWidth: 366,
      nodeOffsets: "Explicit",
    }],
    dataFrame: {
      speed_mps: Number(speed),
      speed_kmh: Math.round(Number(speed) * 3.6 * 10) / 10,
      heading_deg: heading,
      startTime: formatTimeStamp(startDate),
      endTime: formatTimeStamp(endDate),
      durationSeconds: 30,
    },
  };
}

function loadIntersections() {
  let custom = [];
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) custom = JSON.parse(raw).filter(x => x && !x.protected);
  } catch (e) { custom = []; }
  return [DEFAULT_SITE, ...custom];
}

function saveIntersections(list) {
  const custom = list.filter(x => !x.protected);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(custom));
}

/* =========================================================================
 * MapView — imperative Leaflet wrapper
 * ======================================================================= */
const VEH_COLORS = {
  wrongway: ["#ef4444", "rgba(239,68,68,0.85)"],
  suspect:  ["#3b82f6", "rgba(59,130,246,0.7)"],
  normal:   ["#22c55e", "rgba(34,197,94,0.5)"],
};
function vehIconHtml(kind, heading) {
  const [bg, glow] = VEH_COLORS[kind] || VEH_COLORS.normal;
  return `<div class="veh-wrap" style="transform: rotate(${heading}deg)">
            <div class="veh-body" style="background:${bg};box-shadow:0 0 10px 2px ${glow}">▲</div>
          </div>`;
}

function MapView({
  intersection, actors, receivers, detection, flyTarget,
  addMode, drawActive, bboxMode, draftNodes, draftBBox,
  onMapClick, onBBoxDrawn,
}) {
  const elRef = useRef(null);
  const mapRef = useRef(null);
  const baseLayer = useRef(null);
  const simLayer = useRef(null);
  const recvLayer = useRef(null);
  const draftLayer = useRef(null);
  const actorMarkers = useRef({});
  const rsuCircle = useRef(null);
  const handlersRef = useRef({});

  handlersRef.current = { onMapClick, onBBoxDrawn, drawActive, bboxMode };

  // init
  useEffect(() => {
    if (mapRef.current) return;
    const map = L.map(elRef.current, {
      center: intersection.center, zoom: 17, zoomControl: true,
    });
    mapRef.current = map;
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      maxZoom: 20, attribution: "&copy; OpenStreetMap &copy; CARTO",
    }).addTo(map);

    baseLayer.current = L.layerGroup().addTo(map);
    recvLayer.current = L.layerGroup().addTo(map);
    simLayer.current = L.layerGroup().addTo(map);
    draftLayer.current = L.layerGroup().addTo(map);

    // generic click
    map.on("click", (e) => {
      const h = handlersRef.current;
      if (h.drawActive && h.onMapClick) h.onMapClick([e.latlng.lat, e.latlng.lng]);
    });

    // bbox drag
    let dragStart = null, tempRect = null;
    map.on("mousedown", (e) => {
      const h = handlersRef.current;
      if (!h.bboxMode) return;
      dragStart = e.latlng;
      map.dragging.disable();
    });
    map.on("mousemove", (e) => {
      if (!dragStart) return;
      if (tempRect) map.removeLayer(tempRect);
      tempRect = L.rectangle([dragStart, e.latlng], {
        color: "#60a5fa", weight: 1.5, dashArray: "6 6", fillOpacity: 0.08,
      }).addTo(map);
    });
    map.on("mouseup", (e) => {
      if (!dragStart) return;
      const h = handlersRef.current;
      const a = dragStart, b = e.latlng;
      if (tempRect) { map.removeLayer(tempRect); tempRect = null; }
      map.dragging.enable();
      const bounds = {
        nwLat: Math.max(a.lat, b.lat), nwLon: Math.min(a.lng, b.lng),
        seLat: Math.min(a.lat, b.lat), seLon: Math.max(a.lng, b.lng),
      };
      dragStart = null;
      if (h.onBBoxDrawn) h.onBBoxDrawn(bounds);
    });

    setTimeout(() => map.invalidateSize(), 200);
  }, []);

  // rebuild base layers when intersection changes
  useEffect(() => {
    const map = mapRef.current, grp = baseLayer.current;
    if (!map || !grp) return;
    grp.clearLayers();
    const ar = intersection.applicableRegion;
    L.rectangle([[ar.nwLat, ar.nwLon], [ar.seLat, ar.seLon]], {
      color: "#60a5fa", weight: 1.5, dashArray: "6 6",
      fill: true, fillColor: "#3b82f6", fillOpacity: 0.05,
    }).addTo(grp);
    L.polyline(intersection.laneNodes, { color: "#f59e0b", weight: 4, opacity: 0.9 }).addTo(grp);
    intersection.laneNodes.forEach((n) => {
      L.circleMarker(n, { radius: 3, color: "#f59e0b", fillColor: "#f59e0b", fillOpacity: 1, weight: 1 }).addTo(grp);
    });
    // green chevrons showing the LEGAL direction of travel (node order); wrong-way drives against these
    const nodes = intersection.laneNodes;
    for (let i = 0; i < nodes.length - 1; i++) {
      const a = nodes[i], b = nodes[i + 1];
      const mid = [(a[0] + b[0]) / 2, (a[1] + b[1]) / 2];
      const hdg = bearing(a, b);
      const icon = L.divIcon({
        className: "",
        html: `<div class="legal-arrow" style="transform: rotate(${hdg}deg)">▲</div>`,
        iconSize: [16, 16], iconAnchor: [8, 8],
      });
      L.marker(mid, { icon, interactive: false }).addTo(grp);
    }
    map.flyToBounds([[ar.nwLat, ar.nwLon], [ar.seLat, ar.seLon]], { padding: [40, 40], duration: 0.8 });
  }, [intersection.id]);

  // fly to geocode target
  useEffect(() => {
    if (!flyTarget || !mapRef.current) return;
    mapRef.current.flyTo([flyTarget.lat, flyTarget.lon], 16, { duration: 1.0 });
  }, [flyTarget]);

  // actor markers (subject vehicle + ambient traffic) — diffed by id
  useEffect(() => {
    const grp = simLayer.current;
    if (!grp) return;
    const dict = actorMarkers.current;
    const seen = new Set();
    (actors || []).forEach((a) => {
      seen.add(a.id);
      const icon = L.divIcon({ className: "", html: vehIconHtml(a.kind, a.heading), iconSize: [26, 26], iconAnchor: [13, 13] });
      if (dict[a.id]) { dict[a.id].setLatLng(a.coord); dict[a.id].setIcon(icon); }
      else { dict[a.id] = L.marker(a.coord, { icon }).addTo(grp); }
    });
    Object.keys(dict).forEach((id) => {
      if (!seen.has(id)) { grp.removeLayer(dict[id]); delete dict[id]; }
    });
  }, [actors]);

  // receiver markers
  useEffect(() => {
    const grp = recvLayer.current;
    if (!grp) return;
    grp.clearLayers();
    (receivers || []).forEach((r) => {
      const bg = r.alerted ? "#22c55e" : "#64748b";
      const cls = r.alerted ? "recv-alerted" : "";
      const icon = L.divIcon({
        className: "",
        html: `<div class="recv-dot ${cls}" style="background:${bg}">${r.alerted ? "✓" : ""}</div>`,
        iconSize: [14, 14], iconAnchor: [7, 7],
      });
      L.marker(r.coord, { icon }).bindTooltip(r.alerted ? "Alert received" : "C-V2X vehicle", { direction: "top" }).addTo(grp);
    });
  }, [receivers]);

  // RSU broadcast circle
  useEffect(() => {
    const grp = simLayer.current;
    if (!grp) return;
    if (rsuCircle.current) { grp.removeLayer(rsuCircle.current); rsuCircle.current = null; }
    if (!detection) return;
    const c = L.circle(detection.coord, {
      radius: 300, className: "rsu-circle",
      color: "#ef4444", weight: 2, dashArray: "6 8",
      fillColor: "#ef4444", fillOpacity: 0.08,
    }).addTo(grp);
    rsuCircle.current = c;
  }, [detection]);

  // draft layer (add-intersection drawing)
  useEffect(() => {
    const grp = draftLayer.current;
    if (!grp) return;
    grp.clearLayers();
    if (!addMode) return;
    if (draftNodes && draftNodes.length) {
      if (draftNodes.length > 1) {
        L.polyline(draftNodes, { color: "#f59e0b", weight: 4, opacity: 0.9 }).addTo(grp);
      }
      draftNodes.forEach((n, i) => {
        L.circleMarker(n, { radius: 5, color: "#fff", fillColor: "#f59e0b", fillOpacity: 1, weight: 1 })
          .bindTooltip(String(i + 1), { permanent: false }).addTo(grp);
      });
    }
    if (draftBBox) {
      const b = draftBBox;
      L.rectangle([[b.nwLat, b.nwLon], [b.seLat, b.seLon]], {
        color: "#60a5fa", weight: 1.5, dashArray: "6 6", fill: true, fillColor: "#3b82f6", fillOpacity: 0.06,
      }).addTo(grp);
    }
  }, [addMode, draftNodes, draftBBox]);

  return (
    <div className={`relative w-full h-[420px] rounded-xl overflow-hidden border border-[var(--border)] ${drawActive || bboxMode ? "crosshair" : ""}`}>
      <div ref={elRef} className="w-full h-full" />
      <div className="absolute bottom-3 left-3 z-[500] bg-[var(--surface)]/90 backdrop-blur
                      border border-[var(--border)] rounded-lg px-3 py-2 text-xs space-y-1 shadow-lg">
        <div className="flex items-center gap-2">
          <span className="inline-block w-4 h-[3px] rounded bg-orange-400"></span>
          <span className="text-[var(--muted)]">Monitored lane path</span>
        </div>
        <div className="flex items-center gap-2">
          <span className="text-green-400 text-[11px] leading-none">▲</span>
          <span className="text-[var(--muted)]">Legal direction (OSM one-way)</span>
        </div>
        <div className="flex items-center gap-2">
          <span className="inline-block w-3 h-3 rounded bg-red-500 border border-white"></span>
          <span className="text-[var(--muted)]">Wrong-way vehicle</span>
        </div>
        <div className="flex items-center gap-2">
          <span className="inline-block w-4 h-[3px] rounded border border-dashed border-blue-400"></span>
          <span className="text-[var(--muted)]">Applicable region</span>
        </div>
        <div className="flex items-center gap-2">
          <span className="inline-block w-3 h-3 rounded-full border border-dashed border-red-400"></span>
          <span className="text-[var(--muted)]">RSU broadcast (~300m)</span>

        <div className="flex items-center gap-2">

          <span className="text-[var(--muted)]">C-V2X vehicle (rx / idle)</span>

  );

function UperView({ encoded }) {
  const [copied, setCopied] = useState(false);
  const groups = encoded.hex.match(/.{1,2}/g) || [];
  const copyHex = async (e) => {
    e.preventDefault();
    try { await navigator.clipboard.writeText(encoded.hex); } catch (err) {}
    setCopied(true); setTimeout(() => setCopied(false), 1500);
  };
  return (
    <details className="group">
      <summary className="flex items-center justify-between text-xs text-[var(--muted)] hover:text-[var(--text)] transition select-none py-1">

/* =========================================================================

function MetricsTab({ metrics, fpRate, setFpRate, onReset, onExportCSV, alertCount }) {
  const { tp, fp, fn, tn } = metrics;
  const total = tp + fp + fn + tn;
  const precision = tp + fp > 0 ? tp / (tp + fp) : null;
  const recall = tp + fn > 0 ? tp / (tp + fn) : null;
  const accuracy = total > 0 ? (tp + tn) / total : null;
  const f1 = precision != null && recall != null && precision + recall > 0
    ? 2 * precision * recall / (precision + recall) : null;
  const pct = (x) => x == null ? "—" : (x * 100).toFixed(1) + "%";

  const Cell = ({ v, tone }) => (

      {/* Confusion matrix */}
      <div>
        <div className="text-[10px] uppercase tracking-wider text-[var(--muted)] mb-2">Confusion Matrix · {total} runs</div>

            <div className="text-[10px] uppercase tracking-wider text-[var(--muted)]">{k}</div>

  );
}

/* =========================================================================
 * App
 * ======================================================================= */
function App() {
  const [intersections, setIntersections] = useState(loadIntersections);
  const [currentId, setCurrentId] = useState(DEFAULT_SITE.id);
  const current = useMemo(
    () => intersections.find((i) => i.id === currentId) || intersections[0],
    [intersections, currentId]
  );

  const [tab, setTab] = useState("Simulate");

  // alerts
  const [alerts, setAlerts] = useState([]);
  const counterRef = useRef(0);

  // sim controls
  const [speed, setSpeed] = useState(12);
  const [threshold, setThreshold] = useState(8);
  const [animSpeed, setAnimSpeed] = useState("Normal");

  // sim state
  const [sim, setSim] = useState({ running: false, fired: false, status: "Idle — press Start to run a wrong-way pass." });
  const [actors, setActors] = useState([]);
  const [detection, setDetection] = useState(null);
  const intervalRef = useRef(null);
  const pointsRef = useRef([]);
  const forwardPointsRef = useRef([]);
  const idxRef = useRef(0);
  const firedRef = useRef(false);
  const runningRef = useRef(false);
  const fadeTimerRef = useRef(null);
  const runRef = useRef(null);

  // evaluation / extras
  const [metrics, setMetrics] = useState({ tp: 0, fp: 0, fn: 0, tn: 0 });
  const [fpRate, setFpRate] = useState(0.15);
  const [autoDemo, setAutoDemo] = useState(false);
  const [showTraffic, setShowTraffic] = useState(true);
  const [receivers, setReceivers] = useState([]);
  const [inRange, setInRange] = useState({ count: 0, total: 0 });
  const [pushCount, setPushCount] = useState(0);
  const autoDemoRef = useRef(false);
  const showTrafficRef = useRef(true);
  const startSimRef = useRef(null);
  const fpRateRef = useRef(0.15);
  const receiversRef = useRef([]);
  useEffect(() => { showTrafficRef.current = showTraffic; }, [showTraffic]);
  useEffect(() => { fpRateRef.current = fpRate; }, [fpRate]);
  useEffect(() => { receiversRef.current = receivers; }, [receivers]);

  // KPI derived
  const avgLatency = alerts.length
    ? alerts.reduce((s, a) => s + a.latency.total, 0) / alerts.length : null;
  const precision = metrics.tp + metrics.fp > 0 ? metrics.tp / (metrics.tp + metrics.fp) : null;
  const recall = metrics.tp + metrics.fn > 0 ? metrics.tp / (metrics.tp + metrics.fn) : null;

  // pipeline visualization
  const [pipeline, setPipeline] = useState(() => Array(7).fill("idle"));
  const [ticker, setTicker] = useState("Idle — pipeline standing by.");
  const [outputs, setOutputs] = useState({ driver: null, oncoming: null, le: null });
  const [lastPacketID, setLastPacketID] = useState(null);
  const stageTimersRef = useRef([]);
  const clearStageTimers = () => { stageTimersRef.current.forEach(clearTimeout); stageTimersRef.current = []; };

  // alert-active flag for header pill
  const [alertActive, setAlertActive] = useState(false);
  const alertTimerRef = useRef(null);

  // add-intersection state
  const [geoQuery, setGeoQuery] = useState("");
  const [searching, setSearching] = useState(false);
  const [flyTarget, setFlyTarget] = useState(null);
  const [drawActive, setDrawActive] = useState(false);
  const [bboxMode, setBboxMode] = useState(false);
  const [draftNodes, setDraftNodes] = useState([]);
  const [draftBBox, setDraftBBox] = useState(null);
  const [newName, setNewName] = useState("");
  const [newElev, setNewElev] = useState("");
  const [addError, setAddError] = useState("");
  const [snapping, setSnapping] = useState(false);

  const addMode = tab === "Add";

  const fireAlert = useCallback((coord, heading) => {
    const now = new Date();
    const uuid = genUUID();
    const packetID = randomPacketID();
    const elevation = current.elevation || 0;
    const tim = buildTIM({ uuid, packetID, intersection: current, coord, elevation, speed, heading, startDate: now });
    const truth = runRef.current && runRef.current.groundTruth === "normal" ? "FP" : "TP";
    counterRef.current += 1;
    const alert = {
      id: uuid + "-" + counterRef.current,
      number: counterRef.current,
      uuidShort: uuid.slice(0, 8),
      packetID,
      coord, heading, speed,
      confidenceFrames: threshold,
      intersectionName: current.name,
      timestamp: formatTimeStamp(now),
      tim,
      latency: genLatency(),
      encoded: encodeUPER(tim),
      truth,
    };
    setAlerts((prev) => [alert, ...prev]);
    setDetection({ coord, heading });
    setAlertActive(true);
    if (alertTimerRef.current) clearTimeout(alertTimerRef.current);
    alertTimerRef.current = setTimeout(() => setAlertActive(false), 6000);

    // geofence: which receivers are inside the ~300m RSU broadcast radius
    const rs = receiversRef.current || [];
    const flags = rs.map((r) => haversine(coord, r.coord) <= 300);
    setReceivers(rs.map((r, i) => ({ ...r, alerted: flags[i] })));
    setInRange({ count: flags.filter(Boolean).length, total: rs.length });
    setPushCount((n) => n + 1);

    // pipeline: snap all upstream stages complete, light up WWD + broadcast
    clearStageTimers();
    setPipeline(["complete", "complete", "complete", "complete", "complete", "alert", "alert"]);
    setLastPacketID(packetID);
    const ts = formatTimeStamp(now);
    setOutputs({ driver: ts, oncoming: ts, le: ts });
  }, [current, speed, threshold]);

  const stopSim = useCallback((complete) => {
    if (intervalRef.current) { clearInterval(intervalRef.current); intervalRef.current = null; }
    clearStageTimers();
    runningRef.current = false;

    // classify the run into the confusion matrix (only on a natural completion)
    const r = runRef.current;
    if (complete && r && !r.counted) {
      r.counted = true;
      const key = r.fired
        ? (r.groundTruth === "wrongway" ? "tp" : "fp")
        : (r.groundTruth === "wrongway" ? "fn" : "tn");
      setMetrics((m) => ({ ...m, [key]: m[key] + 1 }));
    }

    setActors([]);
    setReceivers((rs) => rs.map((x) => ({ ...x, alerted: false })));
    firedRef.current = false;
    idxRef.current = 0;
    setPipeline(Array(7).fill("idle"));
    setSim({
      running: false, fired: false,
      status: complete ? "✓ Simulation complete — pass ended." : "Idle — press Start to run a wrong-way pass.",
    });
    setTicker(complete ? "Pipeline reset — standing by for next pass." : "Idle — pipeline standing by.");
    if (complete) {
      if (fadeTimerRef.current) clearTimeout(fadeTimerRef.current);
      fadeTimerRef.current = setTimeout(() => { setDetection(null); setInRange({ count: 0, total: 0 }); }, 5000);
      // auto-demo: schedule the next hands-free pass
      if (autoDemoRef.current) {
        setTimeout(() => { if (autoDemoRef.current && startSimRef.current) startSimRef.current(); }, 2800);
      }
    } else {
      setDetection(null);
      setInRange({ count: 0, total: 0 });
    }
  }, []);

  const startSim = useCallback(() => {
    if (current.laneNodes.length < 2) return;
    if (intervalRef.current) clearInterval(intervalRef.current);
    if (fadeTimerRef.current) clearTimeout(fadeTimerRef.current);
    clearStageTimers();
    setDetection(null);

    // ground truth + whether the detector will confirm (drives precision/recall)
    const groundTruth = Math.random() < fpRateRef.current ? "normal" : "wrongway";
    let willConfirm;
    if (groundTruth === "wrongway") {
      const pMiss = Math.max(0, (threshold - 12) * 0.04); // very high thresholds risk a miss (FN)
      willConfirm = Math.random() >= pMiss;
    } else {
      const pFalse = Math.min(0.85, Math.max(0.03, 0.85 - (threshold - 3) * 0.05)); // raise threshold → fewer FPs
      willConfirm = Math.random() < pFalse;
    }
    runRef.current = { groundTruth, willConfirm, fired: false, counted: false };
    const subjectKind = groundTruth === "wrongway" ? "wrongway" : "suspect";

    // subject drives wrong-way (reverse) only when ground truth is wrong-way
    const pts = buildAnimationPoints(current.laneNodes, groundTruth === "wrongway");
    pointsRef.current = pts;
    forwardPointsRef.current = buildAnimationPoints(current.laneNodes, false);
    idxRef.current = 0;
    firedRef.current = false;
    runningRef.current = true;
    const totalNodes = current.laneNodes.length;
    const total = pts.length;
    const ambientOffsets = [0, Math.floor(total / 2)];
    setSim({
      running: true, fired: false,
      status: groundTruth === "wrongway" ? "Tracking wrong-way vehicle…" : "Tracking vehicle — evaluating trajectory…",
    });

    // staged pipeline reveal (guarded so short/fast runs don't light stages after firing)
    setOutputs({ driver: null, oncoming: null, le: null });
    setPipeline(["active", "idle", "idle", "idle", "idle", "idle", "idle"]);
    setTicker(`Frame 1/${total} — ${2000 + Math.round(Math.random() * 2000)} points captured`);
    const adv = (delay, arr) => stageTimersRef.current.push(setTimeout(() => {
      if (!runningRef.current || firedRef.current) return;
      setPipeline(arr);
    }, delay));
    adv(1000, ["complete", "active", "idle", "idle", "idle", "idle", "idle"]);
    adv(2000, ["complete", "complete", "active", "idle", "idle", "idle", "idle"]);
    adv(3000, ["complete", "complete", "complete", "active", "idle", "idle", "idle"]);
    adv(4000, ["complete", "complete", "complete", "complete", "active", "idle", "idle"]);

    intervalRef.current = setInterval(() => {
      const i = idxRef.current;
      const pts = pointsRef.current;
      if (i >= pts.length) {
        stopSim(true);
        return;
      }
      const p = pts[i];
      const confidence = i + 1;
      const nodeNum = Math.min(totalNodes, Math.floor(i / STEPS_PER_SEGMENT) + 1);
      const willConfirm = runRef.current.willConfirm;

      // build actors: subject + (optional) correct-way ambient traffic
      const acts = [{ id: "subject", coord: [p.lat, p.lon], heading: p.heading, kind: subjectKind }];
      if (showTrafficRef.current) {
        const fp = forwardPointsRef.current;
        ambientOffsets.forEach((off, k) => {
          const q = fp[(i + off) % fp.length];
          acts.push({ id: "amb" + k, coord: [q.lat, q.lon], heading: q.heading, kind: "normal" });
        });
      }
      setActors(acts);

      // data ticker
      const frameStr = `Frame ${i + 1}/${pts.length}`;
      const frac = (i + 1) / pts.length;
      if (firedRef.current) {
        setTicker(`${frameStr} — Trajectory confirmed wrong-way — confidence ${threshold}/${threshold} frames — TIM broadcast`);
      } else if (willConfirm && confidence >= threshold - 1) {
        setTicker(`${frameStr} — Trajectory confirmed wrong-way — confidence ${confidence}/${threshold} frames — TIM firing…`);
      } else if (frac > 0.45) {
        setTicker(`${frameStr} — Object cluster at [${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}] — heading ${p.heading}°`);
      } else if (frac > 0.22) {
        setTicker(`${frameStr} — Background filtered: ${200 + Math.round(Math.random() * 200)} foreground points remaining`);
      } else {
        setTicker(`${frameStr} — ${2000 + Math.round(Math.random() * 2000)} points captured`);
      }

      if (!firedRef.current && willConfirm && confidence >= threshold) {
        firedRef.current = true;
        runRef.current.fired = true;
        fireAlert([p.lat, p.lon], p.heading);
        setSim({ running: true, fired: true, status: `🚨 TIM BROADCAST · ITIS 8708 · node ${nodeNum}/${totalNodes}` });
      } else {
        setSim((s) => ({
          running: true, fired: firedRef.current,
          status: firedRef.current
            ? `🚨 TIM BROADCAST · node ${nodeNum}/${totalNodes}`
            : `Vehicle at node ${nodeNum}/${totalNodes} · Confidence: ${confidence}/${threshold} frames`,
        }));
      }
      idxRef.current += 1;
    }, ANIM_SPEEDS[animSpeed]);
  }, [current, threshold, animSpeed, fireAlert, stopSim]);

  // keep a live ref to startSim for auto-demo timers
  useEffect(() => { startSimRef.current = startSim; });
  // stop sim if intersection switches mid-run, and respawn surrounding receivers
  useEffect(() => { stopSim(false); setReceivers(generateReceivers(current.center)); }, [currentId]);
  // cleanup on unmount
  useEffect(() => () => { if (intervalRef.current) clearInterval(intervalRef.current); }, []);

  const clearFeed = () => { setAlerts([]); };

  const toggleAutoDemo = () => {
    setAutoDemo((prev) => {
      const next = !prev;
      autoDemoRef.current = next;
      if (next && !runningRef.current) setTimeout(() => startSimRef.current && startSimRef.current(), 60);
      return next;
    });
  };

  const resetMetrics = () => setMetrics({ tp: 0, fp: 0, fn: 0, tn: 0 });

  const exportCSV = () => {
    if (!alerts.length) return;
    const blob = new Blob([buildAlertsCSV(alerts)], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "wwd_alert_log.csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // ---- add intersection handlers ----
  const onMapClick = useCallback((latlng) => {
    setDraftNodes((prev) => [...prev, latlng]);
  }, []);
  const onBBoxDrawn = useCallback((bounds) => {
    setDraftBBox(bounds);
    setBboxMode(false);
  }, []);

  const doSearch = async () => {
    if (!geoQuery.trim()) return;
    setSearching(true);
    try {
      const res = await fetch("https://nominatim.openstreetmap.org/search?q=" + encodeURIComponent(geoQuery) + "&format=json&limit=1");
      const data = await res.json();
      if (data && data.length) {
        setFlyTarget({ lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), t: Date.now() });
        setAddError("");
      } else {
        setAddError("No results found for that search.");
      }
    } catch (e) {
      setAddError("Geocoding failed (network/CORS). Try again.");
    }
    setSearching(false);
  };

  // Snap the draft path to a real one-way road from OpenStreetMap (Overpass).
  // OSM orders a one-way road's nodes in the legal direction of travel, so the
  // resulting path already encodes which way is "right" — wrong-way is the reverse.
  const snapToRoad = async () => {
    const anchor = flyTarget ? [flyTarget.lat, flyTarget.lon] : current.center;
    setSnapping(true); setAddError("");
    const ql = `[out:json][timeout:25];way["highway"]["oneway"="yes"](around:170,${anchor[0]},${anchor[1]});out geom;`;
    const endpoints = [
      "https://overpass-api.de/api/interpreter",
      "https://overpass.kumi.systems/api/interpreter",
    ];
    try {
      let data = null;
      for (const ep of endpoints) {
        try {
          const r = await fetch(ep, { method: "POST", body: "data=" + encodeURIComponent(ql) });
          if (r.ok) { const j = await r.json(); if (j && j.elements) { data = j; break; } }
        } catch (e) { /* try next */ }
      }
      const ways = (data && data.elements || []).filter((w) => w.geometry && w.geometry.length >= 3);
      if (!ways.length) { setAddError("No one-way road found nearby. Search a point on a one-way road / ramp, then snap."); setSnapping(false); return; }
      // nearest by centroid distance to the anchor
      const cdist = (w) => {
        const g = w.geometry;
        const c = [g.reduce((s, p) => s + p.lat, 0) / g.length, g.reduce((s, p) => s + p.lon, 0) / g.length];
        return haversine(anchor, c);
      };
      ways.sort((a, b) => cdist(a) - cdist(b));
      const w = ways[0];
      let nodes = w.geometry.map((p) => [Number(p.lat.toFixed(6)), Number(p.lon.toFixed(6))]);
      if (nodes.length > 10) { // downsample, keeping first & last
        const out = [], step = (nodes.length - 1) / 9;
        for (let k = 0; k < 9; k++) out.push(nodes[Math.round(k * step)]);
        out.push(nodes[nodes.length - 1]);
        nodes = out;
      }
      setDraftNodes(nodes);
      const lats = nodes.map((n) => n[0]), lons = nodes.map((n) => n[1]), pad = 0.0006;
      setDraftBBox({
        nwLat: Math.max(...lats) + pad, nwLon: Math.min(...lons) - pad,
        seLat: Math.min(...lats) - pad, seLon: Math.max(...lons) + pad,
      });
      const roadName = w.tags && (w.tags.name || w.tags.ref);
      if (!newName.trim()) setNewName(roadName ? `${roadName} — wrong-way zone` : "OSM one-way road");
      const mid = nodes[Math.floor(nodes.length / 2)];
      setFlyTarget({ lat: mid[0], lon: mid[1], t: Date.now() });
      setDrawActive(false);
    } catch (e) {
      setAddError("Road snap failed (network/CORS). Try again or draw manually.");
    }
    setSnapping(false);
  };

  const resetAddForm = () => {
    setDrawActive(false); setBboxMode(false);
    setDraftNodes([]); setDraftBBox(null);
    setNewName(""); setNewElev(""); setAddError(""); setGeoQuery("");
  };

  const saveIntersection = () => {
    if (!newName.trim()) { setAddError("Please enter a name."); return; }
    if (draftNodes.length < 3) { setAddError("Draw at least 3 road-path nodes."); return; }
    if (!draftBBox) { setAddError("Set a bounding box."); return; }
    const id = "int_" + Date.now();
    const lats = draftNodes.map((n) => n[0]), lons = draftNodes.map((n) => n[1]);
    const center = [lats.reduce((a, b) => a + b, 0) / lats.length, lons.reduce((a, b) => a + b, 0) / lons.length];
    const it = {
      id, name: newName.trim(),
      createdAt: new Date().toISOString(),
      center,
      elevation: Number(newElev) || 0,
      applicableRegion: { ...draftBBox },
      laneNodes: draftNodes.map((n) => [n[0], n[1]]),
    };
    const next = [...intersections, it];
    setIntersections(next);
    saveIntersections(next);
    resetAddForm();
    setCurrentId(id);
    setTab("Simulate");
  };

  const deleteIntersection = (id) => {
    const next = intersections.filter((i) => i.id !== id);
    setIntersections(next);
    saveIntersections(next);
    if (currentId === id) setCurrentId(DEFAULT_SITE.id);
  };

  const exportAll = () => {
    const blob = new Blob([JSON.stringify(intersections, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "wwd_v2x_intersections.json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // header pill
  const pill = sim.running && sim.fired
    ? { label: "ALERT ACTIVE", dot: "bg-red-400 status-pulse text-red-400", cls: "bg-red-500/15 border-red-500/40 text-red-300" }
    : sim.running
    ? { label: "Simulation Running", dot: "bg-orange-400 status-pulse text-orange-400", cls: "bg-orange-500/15 border-orange-500/40 text-orange-300" }
    : alertActive
    ? { label: "ALERT ACTIVE", dot: "bg-red-400 status-pulse text-red-400", cls: "bg-red-500/15 border-red-500/40 text-red-300" }
    : { label: "System Ready", dot: "bg-emerald-400", cls: "bg-emerald-500/10 border-emerald-500/30 text-emerald-300" };

  return (
    <div className="min-h-screen">
      {/* Header */}
      <header className="border-b border-[var(--border)] bg-[var(--surface)]/60 backdrop-blur sticky top-0 z-[600]">
        <div className="max-w-[1600px] mx-auto px-6 py-4 flex items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-red-500 to-orange-500 flex items-center justify-center text-xl shadow-lg">📡</div>
            <div>
              <h1 className="text-lg font-bold leading-tight">WWD V2X Alert System</h1>
              <p className="text-xs text-[var(--muted)]">LiDAR → J2735 TIM · C-V2X Broadcast Simulation</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <div className="text-right hidden sm:block">
              <div className="text-[10px] uppercase tracking-wider text-[var(--muted)]">Session Alerts</div>
              <div className="text-lg font-bold text-red-300 leading-tight">{counterRef.current}</div>
            </div>
            <div className={`flex items-center gap-2.5 px-4 py-2 rounded-full border text-sm font-medium transition-colors ${pill.cls}`}>
              <span className={`w-2.5 h-2.5 rounded-full ${pill.dot}`}></span>
              {pill.label}
            </div>
          </div>
        </div>
      </header>

      <div className="pt-4">
        <KPIStrip alertCount={counterRef.current} avgLatency={avgLatency}
          precision={precision} recall={recall} fpRate={fpRate} />
      </div>

      <main className="max-w-[1600px] mx-auto px-6 py-6 grid grid-cols-1 lg:grid-cols-2 gap-6">
        {/* LEFT */}
        <section className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 space-y-5">
          {/* intersection selector */}
          <div className="flex items-center justify-between gap-3">
            <div className="min-w-0">
              <div className="text-[10px] uppercase tracking-wider text-[var(--muted)]">Active Intersection</div>
              <div className="text-base font-semibold truncate">{current.name}</div>
            </div>
            <select value={currentId} onChange={(e) => setCurrentId(e.target.value)}
              className="bg-[var(--surface-2)] border border-[var(--border)] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-orange-500/50 cursor-pointer max-w-[45%]">
              {intersections.map((i) => <option key={i.id} value={i.id}>{i.name}</option>)}
            </select>
          </div>

          <MapView
            intersection={current}
            actors={actors}
            receivers={receivers}
            detection={detection}
            flyTarget={flyTarget}
            addMode={addMode}
            drawActive={addMode && drawActive}
            bboxMode={addMode && bboxMode}
            draftNodes={draftNodes}
            draftBBox={draftBBox}
            onMapClick={onMapClick}
            onBBoxDrawn={onBBoxDrawn}
          />

          {/* tabs */}
          <div className="flex gap-1 bg-[var(--surface-2)] rounded-lg p-1 border border-[var(--border)]">
            {["Simulate", "Metrics", "Add", "Manage"].map((t) => (
              <button key={t} onClick={() => { setTab(t); if (t !== "Add") { setDrawActive(false); setBboxMode(false); } }}
                className={`flex-1 py-2 rounded-md text-sm font-medium transition ${tab === t
                  ? "bg-[var(--bg)] text-[var(--text)] shadow" : "text-[var(--muted)] hover:text-[var(--text)]"}`}>
                {t === "Add" ? "Add Intersection" : t}
              </button>
            ))}
          </div>

          {tab === "Simulate" && (
            <SimulateTab sim={sim} speed={speed} setSpeed={setSpeed}
              threshold={threshold} setThreshold={setThreshold}
              animSpeed={animSpeed} setAnimSpeed={setAnimSpeed}
              onStart={startSim} onStop={() => stopSim(false)}
              autoDemo={autoDemo} onToggleAutoDemo={toggleAutoDemo}
              showTraffic={showTraffic} setShowTraffic={setShowTraffic} />
          )}
          {tab === "Metrics" && (
            <MetricsTab metrics={metrics} fpRate={fpRate} setFpRate={setFpRate}
              onReset={resetMetrics} onExportCSV={exportCSV} alertCount={alerts.length} />
          )}
          {tab === "Add" && (
            <AddTab
              geoQuery={geoQuery} setGeoQuery={setGeoQuery} onSearch={doSearch} searching={searching}
              drawActive={drawActive} setDrawActive={(v) => { setDrawActive(v); if (v) setBboxMode(false); }}
              draftNodes={draftNodes} onUndoNode={() => setDraftNodes((p) => p.slice(0, -1))} onClearPath={() => setDraftNodes([])}
              bboxMode={bboxMode} setBboxMode={(v) => { setBboxMode(v); if (v) setDrawActive(false); }} draftBBox={draftBBox}
              newName={newName} setNewName={setNewName} newElev={newElev} setNewElev={setNewElev}
              onSave={saveIntersection} onCancel={() => { resetAddForm(); setTab("Simulate"); }} error={addError}
              onSnapRoad={snapToRoad} snapping={snapping} />
          )}
          {tab === "Manage" && (
            <ManageTab list={intersections} currentId={currentId}
              onSelect={(id) => { setCurrentId(id); setTab("Simulate"); }}
              onDelete={deleteIntersection} onExport={exportAll} />
          )}
        </section>

        {/* RIGHT */}
        <section className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-5 flex flex-col" style={{ minHeight: "720px" }}>
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-2.5">
              <h2 className="text-base font-semibold">TIM Alert Feed</h2>
              <span className="inline-flex items-center justify-center min-w-[26px] h-6 px-2 rounded-full bg-red-500/20 text-red-300 text-xs font-bold ring-1 ring-red-500/40">
                {alerts.length}
              </span>
            </div>
            <button onClick={clearFeed} disabled={alerts.length === 0}
              className="text-xs px-3 py-1.5 rounded-lg border border-[var(--border)] text-[var(--muted)] hover:text-[var(--text)] hover:border-[var(--muted)] disabled:opacity-30 disabled:cursor-not-allowed transition">
              Clear Feed
            </button>
          </div>

          <div className="flex-1 overflow-y-auto feed-scroll pr-1 space-y-3">
            {alerts.length === 0 ? (
              <div className="h-full flex flex-col items-center justify-center text-center text-[var(--muted)] py-20">
                <div className="text-4xl mb-3 opacity-40">🛰️</div>
                <p className="text-sm">No alerts yet.</p>
                <p className="text-xs mt-1 max-w-xs">Run a simulation to broadcast a J2735 TIM when the wrong-way vehicle is confirmed.</p>
              </div>
            ) : (
              alerts.map((a) => <AlertCard key={a.id} alert={a} />)
            )}
          </div>
        </section>
      </main>

      <div className="max-w-[1600px] mx-auto px-6 pb-6">
        <PipelinePanel
          pipeline={pipeline}
          ticker={ticker}
          outputs={outputs}
          packetID={lastPacketID}
          pulse={sim.fired || alertActive}
          inRange={inRange}
        />
      </div>

      <div className="max-w-[1600px] mx-auto px-6 pb-6">
        <NavPushPanel
          active={sim.fired || alertActive}
          ts={outputs.oncoming}
          inRange={inRange}
          pushCount={pushCount}
        />
      </div>

      <footer className="max-w-[1600px] mx-auto px-6 pb-8 pt-2 text-center text-[11px] text-[var(--muted)]">
        Research demo · TTI WWD detection · Simulated C-V2X / J2735 TIM pipeline · ITIS 8708 (Wrong-Way Driving)
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
